<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-Zenh87qX5JnK2Jl0vWa8Ck2rdkQ2Bzep5IDxbcnCeuOxjzrPF/et3URy9Bv1WTRi" crossorigin="anonymous">
    <link rel="icon" href="../img/icons8-movies-tv-16.png">
</head>

<body>
    <nav class="navbar navbar-expand-lg bg-danger">
        <div class="container-fluid ">
            <a class="navbar-brand text-light" href="../../index.html"><img src="../img/icons8-videocámara-pro-100.png"
                    alt=""> Movie Center</a>
        </div>
    </nav>
    <section class="h-100 gradient-form" style="background-color: #eee;">
        <div class="container py-5 h-100 w-50">
            <div class="row d-flex justify-content-center align-items-center h-100">
                <div class="col-xl-10">
                    <div class="card rounded-3 text-black">
                        <div class="row g-0">
                                <div class="card-body p-md-5 mx-md-4">

                                    <div class="text-center">
                                        <img src="../img/icons8-videocámara-pro-100.png" style="width: 185px;"
                                            alt="logo">
                                        <h4 class="mt-1 mb-5 pb-1">We are Movie Center</h4>
                                    </div>

                                    <form>
                                        <p>Please login to your account</p>

                                        <div class="form-outline mb-4">
                                            <input type="email" id="form2Example11" class="form-control"
                                                placeholder="Email address" />
                                            <label class="form-label" for="form2Example11">Username</label>
                                        </div>

                                        <div class="form-outline mb-4">
                                            <input type="password" id="form2Example22" class="form-control" />
                                            <label class="form-label" for="form2Example22">Password</label>
                                        </div>

                                        <div class="text-center pt-1 mb-5 pb-1">
                                            <button class="btn btn-primary btn-block fa-lg gradient-custom-2 mb-3"
                                                type="button">Log
                                                in</button>
                                            <a class="text-muted" href="#!">Forgot password?</a>
                                        </div>

                                        <div class="d-flex align-items-center justify-content-center pb-4">
                                            <p class="mb-0 me-2">Don't have an account?</p>
                                            <a href="./signup.html" class="text-danger fw-bold ">Sign Up</a>
                                        </div>

                                    </form>

                                </div>

                        </div>
                    </div>
                </div>
            </div>
        </div>
        </div>
    </section>
    <footer class="bg-danger text-center text-white">
        <!-- Grid container -->
        <div class="container p-4 pb-0">
            <!-- Section: Social media -->
            <section class="mb-4">
                <!-- Facebook -->
                <a class="btn text-white btn-floating m-1" href="https://www.facebook.com/nanu.filth/" role="button"
                    target="_blank"><img src="../img/icons8-facebook-nuevo-40.png" alt="icono Facebook"></a>

                <!-- Twitter -->
                <a class="btn text-white btn-floating m-1" href="https://twitter.com/NanuFilth" role="button"
                    target="_blank"><img src="../img/icons8-twitter-40.png" alt=" icono Twitter"></a>


                <!-- Instagram -->
                <a class="btn text-white btn-floating m-1" href="https://www.instagram.com/nanu.filth/" role="button"
                    target="_blank"><img src="../img/icons8-instagram-40.png" alt="icono Instagram"></a>

                <!-- Linkedin -->
                <a class="btn text-white btn-floating m-1" href="#!" role="button"><img
                        src="../img/icons8-linkedin-rodeado-de-círculo-40.png" alt="icono Linkedin"></a>
                <!-- Github -->
                <a class="btn text-white btn-floating m-1" href="https://github.com/MatiasCantero" role="button"
                    target="_blank"><img src="../img/icons8-github-40.png" alt="icono Github"></a>
            </section>
            <!-- Section: Social media -->
        </div>
        <!-- Grid container -->

        <!-- Copyright -->
        <div class="text-center p-3">
            © 2020 Copyright: Matias Nahuel Cantero - Edicacion IT
        </div>
        <!-- Copyright -->
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-OERcA2EqjJCMA+/3y+gxIOqMEjwtxJY7qPCqsdltbNJuaOe923+mo//f6V8Qbsw3"
        crossorigin="anonymous"></script>

</body>

</html>
